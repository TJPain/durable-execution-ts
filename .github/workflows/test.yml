name: Tests

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: durable
          POSTGRES_PASSWORD: durable
          POSTGRES_DB: durable
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - run: psql $DATABASE_URL -f sql/schema.sql
        env:
          DATABASE_URL: postgresql://durable:durable@localhost:5432/durable

      - run: npm test
        env:
          DATABASE_URL: postgresql://durable:durable@localhost:5432/durable
